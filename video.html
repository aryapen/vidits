<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memutar Video - Nonton Video Sepuasnya</title>
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #141414; /* Senada dengan index.html */
            color: #fff; 
            padding: 20px 0;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* --- NAVIGASI TOMBOL KEMBALI --- */
        .nav-box {
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s, transform 0.2s;
            padding: 8px 0;
        }
        .back-btn:hover {
            color: #e50914;
            transform: translateX(-4px);
        }
        .back-btn svg {
            margin-right: 8px;
            fill: currentColor;
        }

        /* --- THEATER VIDEO WRAPPER (16:9) --- */
        .video-player-container {
            position: relative;
            padding-bottom: 56.25%; /* Golden Ratio 16:9 Cinema */
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(229, 9, 20, 0.1);
        }
        .video-player-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* --- DETAIL / TEXT VIDEO --- */
        .video-details {
            margin-top: 25px;
            background: #1c1c1c;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #282828;
        }
        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        /* --- POP-UP ANTI ADBLOCK (Penyelarasan Stabilitas) --- */
        .adblock-layer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            z-index: 999999;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }
        .adblock-box {
            background: #181818;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 450px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7);
        }
        .adblock-box h2 {
            color: #e50914;
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .adblock-box p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .adblock-btn {
            display: inline-block;
            background: #e50914;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .adblock-btn:hover {
            background: #b80710;
            transform: scale(1.02);
        }
    </style>

    <script src="ads.js"></script>
</head>
<body>

    <div class="adblock-layer" id="adblockBlocker">
        <div class="adblock-box">
            <h2>AdBlock Terdeteksi! 🚫</h2>
            <p>Maaf, website ini tidak dapat diakses jika kamu menyalakan AdBlock. Mohon matikan AdBlock atau gunakan browser biasa lalu muat ulang halaman ini untuk melanjutkan menonton.</p>
            <div class="adblock-btn" onclick="window.location.reload();">Saya Sudah Mematikan AdBlock</div>
        </div>
    </div>

    <div class="container">
        <div class="nav-box">
            <a href="index.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24"><path d="M16.67 0l2.83 2.829-9.339 9.175 9.339 9.167-2.83 2.829-12.17-11.996z"/></svg>
                Kembali ke Beranda
            </a>
        </div>
        
        <div class="video-player-container" id="videoContainer">
            </div>

        <div class="video-details">
            <h2 id="videoTitle">Memuat judul video...</h2>
        </div>
    </div>

    <script>
        // Mengurai parameter data dari URL (?id=xxxx&title=xxxx)
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const videoTitle = urlParams.get('title');

        // CEK ADBLOCK JALAN DULUAN
        window.addEventListener('DOMContentLoaded', () => {
            if (window.isAdsAvailable === undefined) {
                document.getElementById('adblockBlocker').style.display = 'flex';
                document.body.style.overflow = 'hidden'; 
            } else {
                // Jika lolos AdBlock, jalankan pemutar video
                initPlayer();
            }
        });

        function initPlayer() {
            if (videoId) {
                // Dekode dan pasang Judul Video asli
                document.getElementById('videoTitle').innerText = videoTitle ? decodeURIComponent(videoTitle) : "Video Tanpa Judul";
                
                // Base Link Embed Doodstream
                const embedUrl = `https://dood.to/e/${videoId}`; 
                
                const container = document.getElementById('videoContainer');
                // Menginjeksi Iframe Premium Player
                container.innerHTML = `<iframe src="${embedUrl}" allowfullscreen scrolling="no" allow="autoplay; encrypted-media"></iframe>`;
            } else {
                document.getElementById('videoTitle').innerText = "Error: Video ID Tidak Ditemukan!";
                document.getElementById('videoContainer').innerHTML = '<div style="text-align:center; padding:20% 0; color:#ff3333; font-weight:bold;">Tautan video tidak valid atau telah kadaluarsa.</div>';
            }
        }
    </script>

    <script src="https://recallscarce.com/b6/9d/33/b69d33bf03cfafc4f944b54673468173.js"></script>
    
    <script src="https://recallscarce.com/7c/4a/11/7c4a11f3ccd4bec4536e013d2b6c8732.js"></script>
    </body>
</html>
