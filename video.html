<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Video Sepuasnya</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #111; 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { 
            text-align: center; 
            color: #e50914; 
            margin-bottom: 30px; 
        }
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .video-card { 
            background: #1c1c1c; 
            border-radius: 8px; 
            overflow: hidden; 
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .video-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 15px rgba(229, 9, 20, 0.2);
        }
        .video-card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            background: #2a2a2a; 
        }
        .video-card h3 { 
            font-size: 14px; 
            margin: 10px; 
            padding: 0 5px; 
            height: 38px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
        }
        .loading { 
            text-align: center; 
            font-size: 18px; 
            color: #aaa; 
            width: 100%; 
            grid-column: 1/-1; 
        }

        /* STYLE POP-UP ANTI ADBLOCK */
        .adblock-layer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .adblock-box {
            background: #222;
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #e50914;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(229, 9, 20, 0.3);
        }
        .adblock-box h2 {
            color: #e50914;
            margin-top: 0;
        }
        .adblock-box p {
            color: #ccc;
            font-size: 15px;
            line-height: 1.6;
        }
        .adblock-btn {
            display: inline-block;
            margin-top: 20px;
            background: #e50914;
            color: #fff;
            padding: 10px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .adblock-btn:hover {
            background: #b80710;
        }
    </style>

    <!-- Memanggil file jebakan ads.js -->
    <script src="ads.js"></script>
</head>
<body>

    <!-- TAMPILAN BLOKIR ANTI ADBLOCK -->
    <div class="adblock-layer" id="adblockBlocker">
        <div class="adblock-box">
            <h2>AdBlock Terdeteksi! 🚫</h2>
            <p>Maaf, website ini tidak dapat diakses jika kamu menyalakan AdBlock. Mohon matikan AdBlock atau gunakan browser biasa lalu muat ulang halaman ini untuk melanjutkan menonton.</p>
            <div class="adblock-btn" onclick="window.location.reload();">Saya Sudah Mematikan AdBlock</div>
        </div>
    </div>

    <h1>Koleksi Video</h1>

    <!-- Tempat Daftar Video Muncul -->
    <div class="video-grid" id="videoGrid">
        <div class="loading">Memuat video...</div>
    </div>

    <script>
        // FUNGSI CEK ADBLOCK JALAN DULUAN
        window.addEventListener('DOMContentLoaded', () => {
            // Jika variabel dari ads.js tidak terbaca, berarti file diblokir AdBlocker
            if (window.isAdsAvailable === undefined) {
                document.getElementById('adblockBlocker').style.display = 'flex';
                document.body.style.overflow = 'hidden'; // Kunci scroll layar
            } else {
                // Jika lolos/tidak pakai AdBlock, baru muat data videonya
                loadVideos();
            }
        });

        function loadVideos() {
            const apiUrl = '/api/videos'; 
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const grid = document.getElementById('videoGrid');
                    grid.innerHTML = ''; 

                    if (data.status === 200 && data.result && data.result.files.length > 0) {
                        data.result.files.forEach(video => {
                            const thumbnail = video.splash_img ? video.splash_img : 'https://via.placeholder.com/220x140?text=No+Thumbnail';
                            
                            const card = document.createElement('a');
                            card.className = 'video-card';
                            card.href = `video.html?id=${video.file_code}&title=${encodeURIComponent(video.title)}`;
                            card.innerHTML = `
                                <img src="${thumbnail}" alt="${video.title}">
                                <h3>${video.title}</h3>
                            `;
                            grid.appendChild(card);
                        });
                    } else {
                        grid.innerHTML = '<div class="loading">Tidak ada video ditemukan atau API bermasalah.</div>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('videoGrid').innerHTML = '<div class="loading">Gagal memuat data dari API.</div>';
                });
        }
    </script>

    <!-- ================= IKLAN GLOBAL BERANDA ================= -->
    <!-- Adsterra Popunder -->
    <script src="https://recallscarce.com/b6/9d/33/b69d33bf03cfafc4f944b54673468173.js"></script>
    
    <!-- Adsterra Social Bar -->
    <script src="https://recallscarce.com/7c/4a/11/7c4a11f3ccd4bec4536e013d2b6c8732.js"></script>
    <!-- ======================================================== -->

</body>
</html>
