<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Video Sepuasnya</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #111; 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { 
            text-align: center; 
            color: #e50914; 
            margin-bottom: 30px; 
        }
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        /* Mengubah card menjadi tag <a> agar bisa diklik dan pindah halaman */
        .video-card { 
            background: #1c1c1c; 
            border-radius: 8px; 
            overflow: hidden; 
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .video-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 15px rgba(229, 9, 20, 0.2);
        }
        .video-card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            background: #2a2a2a; 
        }
        .video-card h3 { 
            font-size: 14px; 
            margin: 10px; 
            padding: 0 5px; 
            height: 38px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
        }
        .loading { 
            text-align: center; 
            font-size: 18px; 
            color: #aaa; 
            width: 100%; 
            grid-column: 1/-1; 
        }
    </style>
</head>
<body>

    <h1>Koleksi Video</h1>

    <div class="video-grid" id="videoGrid">
        <div class="loading">Memuat video...</div>
    </div>

    <script>
        const apiUrl = '/api/videos'; 

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('videoGrid');
                grid.innerHTML = ''; 

                if (data.status === 200 && data.result && data.result.files.length > 0) {
                    data.result.files.forEach(video => {
                        const thumbnail = video.splash_img ? video.splash_img : 'https://via.placeholder.com/220x140?text=No+Thumbnail';
                        
                        const card = document.createElement('a');
                        card.className = 'video-card';
                        // Pindah ke halaman video.html sambil membawa ID dan Judul video lewat URL
                        card.href = `video.html?id=${video.file_code}&title=${encodeURIComponent(video.title)}`;
                        card.innerHTML = `
                            <img src="${thumbnail}" alt="${video.title}">
                            <h3>${video.title}</h3>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<div class="loading">Tidak ada video ditemukan atau API bermasalah.</div>';
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('videoGrid').innerHTML = '<div class="loading">Gagal memuat data dari API.</div>';
            });
    </script>
</body>
</html>
